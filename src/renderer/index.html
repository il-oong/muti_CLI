<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';"
    />
    <title>Muti CLI</title>
    <link rel="stylesheet" href="../../node_modules/xterm/css/xterm.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <aside id="sidebar">
        <div class="sidebar-header">
          <span class="brand">Muti CLI</span>
          <button id="addProjectBtn" class="icon-btn" type="button" title="새 프로젝트">＋</button>
        </div>
        <ul id="projectList" class="project-list"></ul>
        <div id="shellPicker" class="shell-picker" hidden>
          <span class="shell-label">셸:</span>
          <button id="shellPickerBtn" class="shell-btn" type="button">
            <span id="shellPickerText">—</span>
            <span class="caret">▾</span>
          </button>
          <div id="shellMenu" class="shell-menu" hidden role="menu"></div>
        </div>
      </aside>
      <main id="workspace">
        <div id="emptyState" class="empty-state" hidden>
          <p>프로젝트가 없습니다</p>
          <button id="emptyAddBtn" class="cta-btn" type="button">＋ 새 프로젝트 만들기</button>
        </div>
        <div id="projectArea" class="project-area" hidden>
          <div id="tabbar" class="tabbar">
            <ul id="tabList" class="tab-list"></ul>
            <button id="addTabBtn" class="icon-btn" type="button" title="새 터미널 탭">＋</button>
          </div>
          <div id="terminals" class="terminals"></div>
          <div id="noTabs" class="empty-state inset" hidden>
            <p>터미널 탭이 없습니다</p>
            <button id="addFirstTabBtn" class="cta-btn" type="button">＋ 새 탭 열기</button>
          </div>
        </div>
      </main>
    </div>

    <script src="../../node_modules/xterm/lib/xterm.js"></script>
    <script src="../../node_modules/xterm-addon-fit/lib/xterm-addon-fit.js"></script>
    <script src="modal.js"></script>
    <script src="renderer.js"></script>
  </body>
</html>
