<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';" />
    <title>Muti CLI</title>
    <link rel="stylesheet" href="../../node_modules/xterm/css/xterm.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <aside id="sidebar">
        <div class="sidebar-header">
          <span class="brand">Muti CLI</span>
          <button id="addProjectBtn" class="icon-btn" title="새 프로젝트">＋</button>
        </div>
        <ul id="projectList" class="project-list"></ul>
      </aside>
      <main id="workspace">
        <div id="tabbar" class="tabbar">
          <ul id="tabList" class="tab-list"></ul>
          <button id="addTabBtn" class="icon-btn" title="새 터미널 탭">＋</button>
        </div>
        <div id="terminals" class="terminals"></div>
        <div id="empty" class="empty-state">
          왼쪽에서 프로젝트를 선택하거나 <b>＋</b> 버튼으로 새 프로젝트를 만드세요.
        </div>
      </main>
    </div>

    <script src="../../node_modules/xterm/lib/xterm.js"></script>
    <script src="../../node_modules/xterm-addon-fit/lib/xterm-addon-fit.js"></script>
    <script src="renderer.js"></script>
  </body>
</html>
